<h2>💬 Comments</h2>

<input id="usernameInput" placeholder="your username..." />
<br><br>

<input id="commentInput" placeholder="write a comment..." />
<br><br>

<button id="postBtn">Post</button>

<div id="commentList"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAbdszzZqJaGgyvzoGicIXNZe37iH6jbt4",
  authDomain: "my-comments-backup.firebaseapp.com",
  projectId: "my-comments-backup"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SELECT ELEMENTS
const postBtn = document.getElementById("postBtn");
const usernameInput = document.getElementById("usernameInput");
const commentInput = document.getElementById("commentInput");
const commentList = document.getElementById("commentList");

// POST COMMENT
postBtn.onclick = async () => {
    let text = commentInput.value.trim();
    if (!text) return;

    await addDoc(collection(db, "comments"), {
        username: usernameInput.value || "Anonymous",
        text: text,
        time: new Date().toLocaleString()
    });

    commentInput.value = "";
};

// LOAD COMMENTS (REAL-TIME)
onSnapshot(collection(db, "comments"), (snapshot) => {
    commentList.innerHTML = "";

    snapshot.forEach(doc => {
        const c = doc.data();

        let div = document.createElement("div");
        div.innerHTML = `
            <b>${c.username}</b><br>
            ${c.text}<br>
            <small>${c.time}</small>
            <hr>
        `;

        commentList.appendChild(div);
    });
});
</script>
